    <main style="color: #ffffff;">

        <h2>Kontakt forma</h2>

        <form>

            <label>Ime i prezime:</label><br>
            <input type="text" placeholder="Unesite ime"><br><br>

            <label>Email:</label><br>
            <input type="email" placeholder="Unesite email"><br><br>

            <label>Broj telefona:</label><br>
            <input type="tel" placeholder="061234567"><br><br>

            <label>Datum putovanja:</label><br>
            <input type="date"><br><br>

            <label>Broj osoba:</label><br>
            <input type="number" min="1" max="10"><br><br>

            <label>Pol:</label><br>
            <input type="radio" name="pol"> Muški
            <input type="radio" name="pol"> Ženski<br><br>

            <label>Destinacije:</label><br>
            <input type="checkbox"> Pariz<br>
            <input type="checkbox"> Rim<br>
            <input type="checkbox"> Barselona<br>
            <input type="checkbox"> Beč<br><br>

            <label>Izaberite državu:</label><br>
            <select>
                <option>Francuska</option>
                <option>Italija</option>
                <option>Španija</option>
                <option>Austrija</option>
            </select>

            <br><br>

            <label>Poruka:</label><br>
            <textarea rows="5" cols="40"></textarea>

            <br><br>

            <input type="submit" value="Pošalji">
            <input type="reset" value="Obriši">

        </form>

        <h2>Kontakt informacije</h2>

        <p>Email: info@putovanja.rs</p>
        <p>Telefon: +381 60 123 456</p>
        <p>Adresa: Novi Sad, Srbija</p>

    </main>
